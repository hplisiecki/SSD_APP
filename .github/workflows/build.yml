name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: SSD.exe
            artifact_path: dist/SSD.exe
          - os: ubuntu-latest
            artifact: SSD-linux
            artifact_path: dist/SSD
          - os: macos-latest
            artifact: SSD-macos
            artifact_path: dist/SSD.app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install spacy-pkuseg sudachipy sudachidict-core

      - name: Install ssdiff
        run: pip install ssdiff

      - name: Generate macOS icon
        if: runner.os == 'macOS'
        run: |
          python -c "
          import sys
          from PySide6.QtWidgets import QApplication
          app = QApplication(sys.argv)
          from ssdiff_gui.logo import generate_icns
          generate_icns()
          app.quit()
          "

      - name: Build with PyInstaller
        run: pyinstaller SSD.spec --clean --noconfirm

      - name: Zip macOS app bundle
        if: runner.os == 'macOS'
        run: cd dist && zip -r SSD.app.zip SSD.app

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/SSD.app.zip
